<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>URL Shortener</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <h1>URL Shortener</h1>
    <p class="subtitle">Paste a long link, get a short one.</p>

    <form id="shorten-form">
        <label for="url-input" class="sr-only">Long URL to shorten</label>
        <input
            type="url"
            id="url-input"
            placeholder="https://example.com/some/very/long/link"
            aria-label="Long URL to shorten"
            required
        />
        <button type="submit">Shorten</button>
    </form>

    <p id="error-message" class="error hidden" role="alert" aria-live="assertive"></p>

    <div id="result" class="result hidden" role="status" aria-live="polite">
        <div class="short-url-row">
            <a id="short-url-link" href="#" target="_blank"></a>
            <button id="copy-btn" aria-label="Copy shortened URL to clipboard">Copy</button>
        </div>
        <img id="qr-image" alt="QR code for shortened URL" />
        <p class="original-url" id="original-url-text"></p>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
